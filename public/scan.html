<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>OnFire · Escáner de puerta</title>
<meta name="theme-color" content="#050302">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Manrope:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/hellfire.css">
<style>
  /* pantalla completa, sin scroll */
  #view-scan{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;overflow:hidden}
  .scan-top{flex:none;display:flex;align-items:center;justify-content:space-between;padding:11px 15px}
  .scan-top .who{font:700 14px Manrope;color:var(--cream)}
  .live{display:flex;align-items:center;gap:6px;font:600 10px Manrope;color:var(--ok)}
  .live .dot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok)}
  .live.off{color:var(--danger)} .live.off .dot{background:var(--danger);box-shadow:none}
  #cam-wrap{position:relative;flex:1;min-height:0;background:#000;overflow:hidden;
    border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  #cam{width:100%;height:100%;object-fit:cover;display:block}
  #cam-frame{position:absolute;inset:17%;border:2.5px solid rgba(255,150,80,.85);border-radius:20px;
    box-shadow:0 0 0 2000px rgba(0,0,0,.28);pointer-events:none}
  #cam-status{position:absolute;left:0;right:0;bottom:16px;text-align:center;
    font:500 12px Manrope;color:rgba(255,255,255,.72);text-shadow:0 1px 4px #000;padding:0 20px}
  /* mensaje de resultado: compacto, encima de la cámara */
  #result{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;
    justify-content:center;gap:11px;padding:26px;text-align:center;animation:pop .12s ease}
  #result.show{display:flex}
  #result.ok{background:rgba(12,38,25,.95)}
  #result.bad{background:rgba(46,13,15,.95)}
  #result .r-title{font:800 30px/1 Cinzel}
  #result.ok .r-title{color:var(--ok)}
  #result.bad .r-title{color:var(--danger)}
  #result .r-name{font:700 18px/1.25 Manrope;color:#fff;max-width:90%}
  #result .r-meta{font:500 12px Manrope;color:rgba(255,255,255,.6)}
  .r-type{padding:7px 20px;border-radius:11px;font:800 15px "Space Grotesk";letter-spacing:.06em}
  .r-type.vip{background:linear-gradient(150deg,#f3d27a,#d9a53a);color:#3a1e00;box-shadow:0 0 20px rgba(243,210,122,.5)}
  .r-type.gen{background:rgba(255,255,255,.1);color:rgba(255,255,255,.72)}
  #btn-accept{margin-top:8px;padding:13px 46px;border:none;border-radius:14px;
    background:#f6f1e7;color:#141210;font:800 16px Manrope;cursor:pointer}
  #btn-accept:active{transform:scale(.97)}
</style>
</head>
<body>
<div class="glow-orb"></div>

<!-- login (staff usa una cuenta de administrador) -->
<div id="view-login" class="wrap hidden">
  <div style="margin-top:9dvh;text-align:center">
    <div class="brand" style="font-size:34px">ESCÁNER</div>
    <div class="sub" style="margin-top:12px">Validación en la puerta</div>
  </div>
  <div style="margin-top:auto;display:flex;flex-direction:column;gap:12px">
    <div class="hint" style="text-align:center">Entra con una cuenta de administrador</div>
    <input class="input" id="lg-user" placeholder="Usuario o correo" autocomplete="username">
    <input class="input" id="lg-pass" type="password" placeholder="Contraseña" autocomplete="current-password">
    <div class="err" id="lg-err"></div>
    <button class="btn" id="btn-login">ENTRAR&nbsp;&nbsp;⟶</button>
  </div>
</div>

<!-- escáner -->
<div id="view-scan" class="hidden">
  <div class="scan-top">
    <div class="row"><div class="avatar">▣</div><div class="who">Puerta</div></div>
    <div class="row" style="gap:16px">
      <div class="live" id="live"><span class="dot"></span><span id="live-text">En vivo</span></div>
      <button class="linkout" id="btn-logout" style="padding:4px 2px"><span style="font-size:13px">⏻</span>&nbsp;Salir</button>
    </div>
  </div>
  <div id="cam-wrap">
    <video id="cam" muted playsinline></video>
    <div id="cam-frame"></div>
    <div id="cam-status">Apunta la cámara al código QR</div>
    <div id="result"></div>
  </div>
</div>

<script src="/js/jsQR.min.js"></script>
<script src="/js/common.js"></script>
<script src="/js/scan.js"></script>
</body>
</html>
