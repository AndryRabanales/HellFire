<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>OnFire · Escáner de puerta</title>
<meta name="theme-color" content="#050302">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Manrope:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/hellfire.css">
<style>
  #view-scan{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;overflow:hidden}
  .scan-top{flex:none;display:flex;align-items:center;justify-content:space-between;padding:11px 15px}
  .scan-top .who{font:700 14px Manrope;color:var(--cream)}
  .live{display:flex;align-items:center;gap:6px;font:600 10px Manrope;color:var(--ok)}
  .live .dot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok)}
  .live.off{color:var(--danger)} .live.off .dot{background:var(--danger);box-shadow:none}
  #cam-wrap{position:relative;flex:1;min-height:0;background:#000;overflow:hidden;
    border-top:1px solid var(--line)}
  #cam{width:100%;height:100%;object-fit:cover;display:block}
  #cam-frame{position:absolute;top:8%;left:50%;transform:translateX(-50%);width:62%;aspect-ratio:1;
    border:2.5px solid rgba(255,150,80,.85);border-radius:20px;pointer-events:none}
  #cam-status{position:absolute;top:8px;left:0;right:0;text-align:center;
    font:500 12px Manrope;color:rgba(255,255,255,.7);text-shadow:0 1px 4px #000;padding:0 20px}
  /* resultado: tarjeta compacta abajo; la cámara sigue visible arriba para escanear el siguiente */
  #result{position:absolute;left:12px;right:12px;bottom:16px;border-radius:18px;padding:16px 18px;
    display:none;flex-direction:column;align-items:center;gap:8px;text-align:center;
    backdrop-filter:blur(10px);animation:pop .12s ease}
  #result.show{display:flex}
  #result.ok{background:rgba(12,40,26,.92);border:2px solid rgba(126,226,168,.7)}
  #result.bad{background:rgba(48,13,15,.92);border:2px solid rgba(232,112,106,.72)}
  #result .r-title{font:800 28px/1 Cinzel}
  #result.ok .r-title{color:var(--ok)}
  #result.bad .r-title{color:var(--danger)}
  #result .r-name{font:700 18px/1.2 Manrope;color:#fff}
  #result .r-meta{font:500 12px Manrope;color:rgba(255,255,255,.6)}
  .r-type{padding:6px 18px;border-radius:10px;font:800 14px "Space Grotesk";letter-spacing:.06em}
  .r-type.vip{background:linear-gradient(150deg,#f3d27a,#d9a53a);color:#3a1e00;box-shadow:0 0 18px rgba(243,210,122,.5)}
  .r-type.gen{background:rgba(255,255,255,.1);color:rgba(255,255,255,.72)}
</style>
</head>
<body>
<div class="glow-orb"></div>

<div id="view-scan">
  <div class="scan-top">
    <div class="row"><div class="avatar">▣</div><div class="who">Puerta</div></div>
    <div class="live" id="live"><span class="dot"></span><span id="live-text">En vivo</span></div>
  </div>
  <div id="cam-wrap">
    <video id="cam" muted playsinline></video>
    <div id="cam-frame"></div>
    <div id="cam-status">Apunta la cámara al código QR</div>
    <div id="result"></div>
  </div>
</div>

<script src="/js/jsQR.min.js"></script>
<script src="/js/common.js"></script>
<script src="/js/scan.js"></script>
</body>
</html>
